<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archiv – HranaNetu.cz TCG Klub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--bg2:#0f0f1c;--bg3:#16162a;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);
  --purple:#c51df5;--pl:#d44fff;--pd:rgba(197,29,245,0.15);
  --gold:#f0a500;--silver:#c0c0c8;--bronze:#c87d3a;
  --text:#f0ecff;--text2:#b8b4d0;--text3:#7a768f;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;font-size:15px}
header{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.hi{max-width:1280px;margin:0 auto;padding:0 28px;height:72px;display:flex;align-items:center;gap:28px}
.logo{text-decoration:none;flex-shrink:0}.logo img{height:46px;width:auto;display:block}
.main-nav{display:flex;align-items:center;gap:3px;flex:1}
.main-nav a{text-decoration:none;font-size:14px;font-weight:500;color:var(--text2);padding:7px 13px;border-radius:7px;transition:color .15s,background .15s;white-space:nowrap}
.main-nav a:hover{color:var(--text);background:var(--bg3)}.main-nav a.act{color:var(--pl);background:var(--bg3)}
.hdr-btns{display:flex;align-items:center;gap:10px;flex-shrink:0}
.btn-outline{border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:14px;font-weight:500;padding:8px 16px;border-radius:7px;text-decoration:none;transition:all .15s}
.btn-outline:hover{border-color:var(--purple);color:var(--pl)}
.btn-solid{background:var(--purple);color:#fff;font-size:14px;font-weight:600;padding:8px 18px;border-radius:7px;text-decoration:none;transition:background .15s}
.btn-solid:hover{background:var(--pl)}
.hbg{display:none;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:7px;border:1px solid var(--border2);border-radius:7px;background:transparent;flex-shrink:0;width:38px;height:38px}
.hbg span{display:block;width:20px;height:2px;background:var(--text2);border-radius:2px;transition:all .25s;pointer-events:none}
.hbg.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hbg.open span:nth-child(2){opacity:0}.hbg.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mob-nav{display:none;position:fixed;top:72px;left:0;right:0;bottom:0;background:var(--bg2);z-index:199;flex-direction:column;gap:4px;padding:20px 24px;border-top:1px solid var(--border);overflow-y:auto}
.mob-nav.open{display:flex}
.mob-nav a{text-decoration:none;font-size:17px;font-weight:500;color:var(--text2);padding:14px 16px;border-radius:10px;transition:all .15s;display:block}
.mob-nav a:hover{color:var(--text);background:var(--bg3)}.mob-nav a.act{color:var(--pl);background:var(--pd)}
@media(max-width:900px){.main-nav,.hdr-btns{display:none}.hbg{display:flex}}
@media(max-width:480px){.hi{padding:0 16px;height:64px}.logo img{height:40px}.mob-nav{top:64px}}

.con{max-width:1280px;margin:0 auto;padding:0 28px}
.page-top{padding:40px 0 28px}
.eyebrow{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:6px}
.page-title{font-family:'Rajdhani',sans-serif;font-size:46px;font-weight:700;line-height:1;margin-bottom:8px}
.page-sub{font-size:14px;color:var(--text3)}

/* SEZÓNA TABS */
.season-tabs{display:flex;gap:8px;flex-wrap:wrap;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:32px}
.stab{background:var(--bg2);border:1px solid var(--border2);color:var(--text2);font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Rajdhani',sans-serif;transition:all .15s}
.stab:hover{border-color:var(--purple);color:var(--pl)}
.stab.active{border-color:var(--purple);background:var(--pd);color:var(--pl)}

/* LOADING/EMPTY */
.arch-status{padding:60px 20px;text-align:center;color:var(--text3);font-size:14px}
.arch-status .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:-3px}
@keyframes spin{to{transform:rotate(360deg)}}

/* LEAGUE CARDS GRID */
.arch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:60px}
.arch-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .15s}
.arch-card:hover{border-color:var(--border2)}
.arch-card-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.arch-card-name{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700}
.arch-card-fmt{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.fmt-zeb{background:rgba(255,255,255,.08);color:var(--text2)}
.fmt-top4{background:rgba(197,29,245,.15);color:var(--pl)}
.fmt-top8{background:rgba(240,165,0,.15);color:var(--gold)}
.arch-card-body{padding:16px 18px}
.podium-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.podium-row:last-child{border-bottom:none}
.podium-medal{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:'Rajdhani',sans-serif}
.medal-1{background:rgba(240,165,0,.18);color:var(--gold)}
.medal-2{background:rgba(192,192,200,.18);color:var(--silver)}
.medal-3{background:rgba(200,125,58,.18);color:var(--bronze)}
.podium-name{font-size:14px;font-weight:600;flex:1}
.podium-pts{font-size:12px;color:var(--text3)}
.arch-card-foot{padding:10px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);display:flex;justify-content:space-between}
.arch-empty-card{padding:24px 18px;text-align:center;color:var(--text3);font-size:13px}

footer{background:var(--bg2);border-top:1px solid var(--border);padding:28px 24px;text-align:center;font-size:12px;color:var(--text3)}
footer a{color:var(--pl);text-decoration:none}
</style>
</head>

<div class="con">
  <div class="page-top">
    <div class="eyebrow">Historie</div>
    <div class="page-title">ARCHIV SEZÓN</div>
    <div class="page-sub">Výsledky a žebříčky minulých sezón napříč všemi ligami.</div>
  </div>

<script>
const LEAGUES = [
  {id:'fab',   code:'FAB',       name:'Flesh and Blood', color:'#4ade80'},
  {id:'gd',    code:'GUNDAM',    name:'Gundam',          color:'#fcd34d'},
  {id:'mtgd',  code:'MTG',       name:'MTG Draft',       color:'#b39ddb'},
  {id:'mtgm',  code:'MTG',       name:'MTG Modern',      color:'#9b4dff'},
  {id:'mtgpa', code:'MTG',       name:'MTG Pauper',      color:'#a78bfa'},
  {id:'mtgp',  code:'MTG',       name:'MTG Premodern',   color:'#c51df5'},
  {id:'mtgstd',code:'MTG',       name:'MTG Standard',    color:'#22d3ee'},
  {id:'op',    code:'ONE PIECE', name:'One Piece',       color:'#f87171'},
  {id:'pk',    code:'POKÉMON',   name:'Pokémon',         color:'#ffcb05'},
  {id:'rb',    code:'RIFTBOUND', name:'Riftbound',       color:'#7fb3f5'},
  {id:'so',    code:'SORCERY',   name:'Sorcery',         color:'#c084fc'},
  {id:'ygo',   code:'YGO',       name:'Yu-Gi-Oh!',       color:'#fb923c'},
];

// Možné historické sezóny (nejnovější první, aktuální se vynechá)
function pastSeasons() {
  const now = new Date();
  const yr = now.getFullYear();
  const seasons = [];
  // Projdi 3 roky zpět, 4 sezóny na rok
  for (let y = yr; y >= yr - 2; y--) {
    ['Zima', 'Podzim', 'Léto', 'Jaro'].forEach(s => {
      seasons.push(`${s} ${y}`);
    });
  }
  return seasons;
}

let activeSeason = null;
let seasonsWithData = [];

function parseCSV(text) {
  const rows = [];
  for (const line of text.trim().split('\n')) {
    if (!line.trim()) continue;
    const cells = []; let cur = '', inQ = false;
    for (const c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cells.push(cur.trim());
    rows.push(cells);
  }
  return rows;
}

function getSheetId(leagueId) {
  for (const key of ['hn_' + leagueId, 'hrana_sheets_' + leagueId]) {
    try {
      const s = localStorage.getItem(key);
      if (s) { const d = JSON.parse(s); if (d.sheetId) return d.sheetId; }
    } catch(e) {}
  }
  return null;
}

async function fetchSeasonData(sheetId, seasonTab) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(seasonTab)}`;
  const res = await fetch(url);
  if (!res.ok) return null;
  const text = await res.text();
  if (text.includes('google.visualization') || text.trim().startsWith('/*') || text.includes('#REF')) return null;
  const rows = parseCSV(text);
  if (rows.length < 2) return null;
  return rows;
}

function finaleFormatFromAvg(avg) {
  if (avg >= 13) return {type:'TOP8', cls:'fmt-top8'};
  if (avg >= 8)  return {type:'TOP4', cls:'fmt-top4'};
  return {type:'ŽEBŘÍČEK', cls:'fmt-zeb'};
}

async function loadLeagueForSeason(league, seasonTab) {
  const sheetId = getSheetId(league.id);
  if (!sheetId) return null;

  const rows = await fetchSeasonData(sheetId, seasonTab);
  if (!rows) return null;

  const header = rows[0];
  const dataRows = rows.slice(1).filter(r => r[0] && r[0].trim());
  if (!dataRows.length) return null;

  // Body celkově = sloupec index 1
  const players = dataRows.map(r => ({
    name: r[0].replace(/^"+|"+$/g,'').trim(),
    pts: parseFloat(r[1]) || 0,
  })).sort((a,b) => b.pts - a.pts);

  // Průměr hráčů z odehraných kol
  const finaleIdx = header.length - 1;
  const roundIdxs = [];
  for (let i = 2; i < finaleIdx; i++) if (header[i]) roundIdxs.push(i);

  let sum = 0, count = 0;
  roundIdxs.forEach(ri => {
    const played = dataRows.filter(r => parseFloat(r[ri]) > 0).length;
    if (played > 0) { sum += played; count++; }
  });
  const avg = count > 0 ? sum / count : 0;
  const fmt = finaleFormatFromAvg(avg);

  return {
    league,
    top3: players.slice(0,3),
    totalPlayers: players.length,
    avg,
    fmt,
  };
}

function renderCard(data) {
  if (!data) return '';
  const { league, top3, totalPlayers, fmt } = data;
  const medals = ['medal-1','medal-2','medal-3'];
  const podiumRows = top3.map((p,i) => `
    <div class="podium-row">
      <div class="podium-medal ${medals[i]}">${i+1}</div>
      <div class="podium-name">${p.name}</div>
      <div class="podium-pts">${p.pts} b.</div>
    </div>`).join('');

  return `<div class="arch-card">
    <div class="arch-card-head">
      <div class="arch-card-name" style="color:${league.color}">${league.name}</div>
      <div class="arch-card-fmt ${fmt.cls}">${fmt.type}</div>
    </div>
    <div class="arch-card-body">
      ${podiumRows || '<div class="arch-empty-card">Žádná data</div>'}
    </div>
    <div class="arch-card-foot">
      <span>${totalPlayers} hráčů</span>
      <a href="/hrananetu-tcg-dev/tcg-liga-detail.html?liga=${league.id}" style="color:var(--pl);text-decoration:none">Detail →</a>
    </div>
  </div>`;
}

async function checkSeasonHasData(seasonTab) {
  // Zkus první ligu s nastaveným Sheets ID
  for (const l of LEAGUES) {
    const sheetId = getSheetId(l.id);
    if (!sheetId) continue;
    const rows = await fetchSeasonData(sheetId, seasonTab);
    if (rows) return true;
  }
  return false;
}

async function findSeasonsWithData() {
  const candidates = pastSeasons();
  const found = [];
  // Testuj max 8 sezón dopředu abychom zbytečně nespamovali
  for (const s of candidates.slice(0, 8)) {
    const has = await checkSeasonHasData(s);
    if (has) found.push(s);
    if (found.length >= 6) break; // dost sezón k zobrazení
  }
  return found;
}

function renderTabs() {
  const wrap = document.getElementById('season-tabs');
  wrap.innerHTML = seasonsWithData.map(s =>
    `<button class="stab ${s===activeSeason?'active':''}" onclick="selectSeason('${s}')">${s}</button>`
  ).join('');
}

async function selectSeason(season) {
  activeSeason = season;
  renderTabs();
  await loadSeasonGrid(season);
}

async function loadSeasonGrid(season) {
  const status = document.getElementById('arch-status');
  const grid = document.getElementById('arch-grid');
  grid.innerHTML = '';
  status.innerHTML = '<span class="spinner"></span>Načítám sezónu ' + season + '…';

  const results = await Promise.all(LEAGUES.map(l => loadLeagueForSeason(l, season)));
  const valid = results.filter(Boolean);

  status.innerHTML = '';
  if (!valid.length) {
    status.textContent = 'Pro tuto sezónu nejsou k dispozici žádná data.';
    return;
  }
  grid.innerHTML = valid.map(renderCard).join('');
}

async function init() {
  const status = document.getElementById('arch-status');
  status.innerHTML = '<span class="spinner"></span>Hledám dostupné sezóny…';

  seasonsWithData = await findSeasonsWithData();

  if (!seasonsWithData.length) {
    status.textContent = 'Zatím nejsou k dispozici žádná archivní data. Jakmile skončí první sezóna, objeví se zde.';
    return;
  }

  activeSeason = seasonsWithData[0];
  renderTabs();
  await loadSeasonGrid(activeSeason);
}

init();
</script>

<script>
!function(){var o=false;window.toggleMenu=function(){o=!o;document.getElementById('hbg').classList.toggle('open',o);document.getElementById('mob-nav').classList.toggle('open',o);document.body.style.overflow=o?'hidden':'';};document.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('#mob-nav a').forEach(function(a){a.addEventListener('click',function(){o=false;document.getElementById('hbg').classList.remove('open');document.getElementById('mob-nav').classList.remove('open');document.body.style.overflow='';});});});}();
</script>
