<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--bg2:#0f0f1c;--bg3:#16162a;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);
  --purple:#c51df5;--pl:#d44fff;--pd:rgba(197,29,245,0.15);
  --gold:#f0a500;--text:#f0ecff;--text2:#b8b4d0;--text3:#7a768f;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;font-size:15px}
header{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.hi{max-width:1280px;margin:0 auto;padding:0 28px;height:72px;display:flex;align-items:center;gap:28px}
.logo{text-decoration:none;flex-shrink:0}.logo img{height:46px;width:auto;display:block}
.main-nav{display:flex;align-items:center;gap:3px;flex:1}
.main-nav a{text-decoration:none;font-size:14px;font-weight:500;color:var(--text2);padding:7px 13px;border-radius:7px;transition:color .15s,background .15s;white-space:nowrap}
.main-nav a:hover{color:var(--text);background:var(--bg3)}.main-nav a.act{color:var(--pl);background:var(--bg3)}
.hdr-btns{display:flex;align-items:center;gap:10px;flex-shrink:0}
.btn-outline{border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:14px;font-weight:500;padding:8px 16px;border-radius:7px;text-decoration:none;transition:all .15s}
.btn-outline:hover{border-color:var(--purple);color:var(--pl)}
.btn-solid{background:var(--purple);color:#fff;font-size:14px;font-weight:600;padding:8px 18px;border-radius:7px;text-decoration:none;transition:background .15s}
.btn-solid:hover{background:var(--pl)}
.hbg{display:none;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:7px;border:1px solid var(--border2);border-radius:7px;background:transparent;flex-shrink:0;width:38px;height:38px}
.hbg span{display:block;width:20px;height:2px;background:var(--text2);border-radius:2px;transition:all .25s;pointer-events:none}
.hbg.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hbg.open span:nth-child(2){opacity:0}.hbg.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mob-nav{display:none;position:fixed;top:72px;left:0;right:0;bottom:0;background:var(--bg2);z-index:199;flex-direction:column;gap:4px;padding:20px 24px;border-top:1px solid var(--border);overflow-y:auto}
.mob-nav.open{display:flex}
.mob-nav a{text-decoration:none;font-size:17px;font-weight:500;color:var(--text2);padding:14px 16px;border-radius:10px;transition:all .15s;display:block}
.mob-nav a:hover{color:var(--text);background:var(--bg3)}.mob-nav a.act{color:var(--pl);background:var(--pd)}
@media(max-width:900px){.main-nav,.hdr-btns{display:none}.hbg{display:flex}}
@media(max-width:480px){.hi{padding:0 16px;height:64px}.logo img{height:40px}.mob-nav{top:64px}}
.con{max-width:1280px;margin:0 auto;padding:0 28px}
.page-top{padding:40px 0 24px}
.eyebrow{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:6px}
.page-title{font-family:'Rajdhani',sans-serif;font-size:46px;font-weight:700;line-height:1;margin-bottom:8px}
.page-sub{font-size:14px;color:var(--text3)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:18px 0;border-bottom:1px solid var(--border);margin-bottom:2px}
.filter-wrap{position:relative}
.filter-wrap select{appearance:none;background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-size:13px;font-weight:500;padding:8px 30px 8px 12px;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.filter-wrap select:focus{border-color:var(--purple)}
.filter-wrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:11px}
.nav-group{display:flex;align-items:center;gap:8px;margin-left:auto}
.kal-arrow{background:var(--bg2);border:1px solid var(--border2);color:var(--text2);width:34px;height:34px;border-radius:7px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Inter',sans-serif;flex-shrink:0}
.kal-arrow:hover{border-color:var(--purple);color:var(--pl)}
.month-label{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;min-width:160px;text-align:center}
.add-btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;font-weight:500;padding:8px 14px;border-radius:7px;text-decoration:none;transition:all .15s;white-space:nowrap}
.add-btn:hover{border-color:var(--purple);color:var(--pl)}

/* GRID */
.kal-wrap{margin-bottom:60px}
.kal-head{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));background:var(--bg2);border:1px solid var(--border);border-bottom:none;border-radius:10px 10px 0 0;overflow:hidden}
.kal-hdr{padding:10px 0;text-align:center;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;border-right:1px solid var(--border)}
.kal-hdr:last-child{border-right:none}
.kal-body{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden}
.kal-cell{background:var(--bg);min-height:96px;padding:8px 6px;display:flex;flex-direction:column;gap:3px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.kal-cell:nth-child(7n){border-right:none}
.kal-cell.out{opacity:.3}
.kal-cell.today .day-num{background:var(--purple);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;line-height:1}
.day-num{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:2px;line-height:1.4}
.pills{display:flex;flex-direction:column;gap:2px;overflow:hidden}

/* PILLS */
.pill{border-radius:4px;padding:2px 6px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.7;transition:opacity .12s;border-left:2px solid transparent}
.pill:hover{opacity:.75}

.pill-mtgm  {background:rgba(124,77,255,.15); color:#9b4dff; border-color:#9b4dff}
.pill-mtgd  {background:rgba(179,157,219,.15);color:#b39ddb; border-color:#b39ddb}
.pill-mtgstd{background:rgba(6,182,212,.15);  color:#22d3ee; border-color:#22d3ee}
.pill-mtgcmd{background:rgba(99,102,241,.15); color:#818cf8; border-color:#818cf8}
.pill-mtgpre{background:rgba(244,114,182,.15);color:#f472b6; border-color:#f472b6}
.pill-rb    {background:rgba(127,179,245,.15);color:#7fb3f5; border-color:#7fb3f5}
.pill-pk    {background:rgba(255,203,5,.15);  color:#c8a000; border-color:#ffcb05}
.pill-op    {background:rgba(248,113,113,.15);color:#f87171; border-color:#f87171}
.pill-fab   {background:rgba(74,222,128,.15); color:#4ade80; border-color:#4ade80}
.pill-gd    {background:rgba(252,211,77,.15); color:#b8940a; border-color:#fcd34d}
.pill-so    {background:rgba(192,132,252,.15);color:#c084fc; border-color:#c084fc}
.pill-ygo   {background:rgba(251,146,60,.15); color:#fb923c; border-color:#fb923c}
.pill-finale{background:rgba(240,165,0,.15);  color:var(--gold);border-color:var(--gold)}
.pill-other {background:rgba(255,255,255,.06);color:var(--text2);border-color:var(--border2)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;align-items:center;justify-content:center;padding:20px}

.modal-top{height:4px;border-radius:16px 16px 0 0}
.modal-head{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.modal-tag{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;line-height:1.2}

.modal-x{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:6px;line-height:1}
.modal-x:hover{background:var(--bg3);color:var(--text)}
.modal-body{padding:20px 22px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.detail-row{display:flex;flex-direction:column;gap:3px}
.detail-row.full{grid-column:1/-1}
.detail-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.detail-val{font-size:14px;color:var(--text);font-weight:500}
.prizes-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px}
.prizes-title{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.prize-row{font-size:13px;color:var(--text2);padding:3px 0}

.kal-msg{padding:48px;text-align:center;color:var(--text3);font-size:14px;border:1px solid var(--border);border-radius:10px;margin-bottom:48px}
footer{background:var(--bg2);border-top:1px solid var(--border);padding:28px 24px;text-align:center;font-size:12px;color:var(--text3)}
footer a{color:var(--pl);text-decoration:none}
@media(max-width:700px){.kal-cell{min-height:60px}.pill{font-size:9px;padding:1px 4px}}
</style>

<script>
// ── KONFIGURACE LING ──
// Klíč pro detekci: hledáme v rawTitle (bez emoji)
// Formát titulku v Google Calendar: "Emoji Hra - Formát/Název - Typ"
// Příklady: "🎮 MTG - Premodern - Liga", "🃏 Yu-Gi-Oh! - Weekly", "🎮 Riftbound - Skirmish"

const LIGA_CFG = {
  mtgp:   { label:'MTG Premodern',  color:'#c51df5', cls:'mtgp'   },
  mtgpa:  { label:'MTG Pauper',     color:'#a78bfa', cls:'mtgpa'  },
  mtgm:   { label:'MTG Modern',     color:'#9b4dff', cls:'mtgm'   },
  mtgd:   { label:'MTG Draft',      color:'#b39ddb', cls:'mtgd'   },
  mtgstd: { label:'MTG Standard',   color:'#22d3ee', cls:'mtgstd' },
  mtgcmd: { label:'MTG Commander',  color:'#818cf8', cls:'mtgcmd' },
  mtgpre: { label:'MTG Prerelease', color:'#f472b6', cls:'mtgpre' },
  rb:     { label:'Riftbound',      color:'#7fb3f5', cls:'rb'     },
  pk:     { label:'Pokémon',        color:'#ffcb05', cls:'pk'     },
  op:     { label:'One Piece',      color:'#f87171', cls:'op'     },
  fab:    { label:'Flesh and Blood',color:'#4ade80', cls:'fab'    },
  gd:     { label:'Gundam',         color:'#fcd34d', cls:'gd'     },
  so:     { label:'Sorcery',        color:'#c084fc', cls:'so'     },
  ygo:    { label:'Yu-Gi-Oh!',      color:'#fb923c', cls:'ygo'    },
};

// Detekce ligy z titulku Google Calendar
// Titulek (bez emoji): "MTG - Premodern - Liga" nebo "Riftbound - Skirmish - Liga"
function detectLiga(raw) {
  // Odstraň vše před prvním ASCII písmenem (emoji, mezery)
  const clean = (raw||'').replace(/^[^A-Za-zÀ-ɏ]+/, '').trim();
  const t = clean.toLowerCase();

  // Yu-Gi-Oh! musí být před splitem!
  if (t.startsWith('yu-gi-oh') || t.startsWith('yugioh')) return 'ygo';

  // Split na " - "
  const parts = clean.split(' - ');
  const game   = (parts[0]||'').toLowerCase().trim();
  const format = (parts[1]||'').toLowerCase().trim();

  // Non-MTG
  if (game.startsWith('riftbound'))                              return 'rb';
  if (game.startsWith('pokémon') || game.startsWith('pokemon')) return 'pk';
  if (game.startsWith('one piece'))                              return 'op';
  if (game.startsWith('flesh'))                                  return 'fab';
  if (game.startsWith('gundam'))                                 return 'gd';
  if (game.startsWith('sorcery'))                                return 'so';

  // MTG
  if (game === 'mtg' || game === 'magic') {
    if (format.includes('premodern'))                            return 'mtgp';
    if (format.includes('pauper'))                               return 'mtgpa';
    if (format.includes('commander') || format.includes('edh'))  return 'mtgcmd';
    if (format.includes('prerelease') || format.includes('pre-release')) return 'mtgpre';
    if (format.includes('modern'))                               return 'mtgm';
    if (format.includes('standard') || format.includes('pioneer')) return 'mtgstd';
    if (format.includes('draft') || format.includes('sealed'))  return 'mtgd';
    if (format.includes('legacy') || format.includes('vintage')) return 'mtgp';
    return null;
  }
  return null;
}

// Pomocné funkce
function stripEmoji(s) {
  return (s||'').replace(/^[^A-Za-zÀ-ɏ\d(]+/, '').replace(/[^\x20-\x7EÀ-ɏĀ-ž]/g,'').trim();
}

function parseDesc(desc) {
  const text = (desc||'').replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&');
  const f = {};
  text.split('\n').forEach(line => {
    const c = stripEmoji(line).trim();
    if (!c) return;
    const m = c.match(/^([^:]{1,25}):\s*(.+)$/);
    if (m) { f[m[1].toLowerCase()] = m[2].trim(); return; }
    if (/^formát\s+/i.test(c)) f['formát'] = c.replace(/^formát\s+/i,'').trim();
    if (/hrana store|úvoz/i.test(c) && !f['místo']) f['místo'] = c;
    if (/^počet kol/i.test(c)) f['počet kol'] = c.replace(/^počet kol\s*/i,'').trim();
    if (/^vstupné/i.test(c)) f['vstupné'] = c.replace(/^vstupné\s*/i,'').trim();
    if (/^ceny/i.test(c)) f['ceny'] = c.replace(/^ceny[:\s]*/i,'').trim();
    if (/registrace/i.test(c)) {
      const rm = c.match(/registrace[:\s]+(\d{1,2}:\d{2})/i);
      const sm = c.match(/start[:\s]+(\d{1,2}:\d{2})/i);
      if (rm) f['registrace'] = rm[1];
      if (sm) f['start'] = sm[1];
    }
  });
  return f;
}

function subMins(t, m) {
  const match = (t||'').match(/^(\d{1,2}):(\d{2})$/);
  if (!match) return t;
  const total = parseInt(match[1])*60 + parseInt(match[2]) - m;
  const h = Math.floor(((total%1440)+1440)%1440/60);
  const mn = ((total%60)+60)%60;
  return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');
}

const MONTHS = ['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
const MONTHS_LONG = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
const DAYS = ['Po','Út','St','Čt','Pá','So','Ne'];

let allEvents = [];
let monthOff = 0;
let activeFilter = 'all';
let flatEvs = [];

// ── NAČTENÍ KALENDÁŘE ──
async function loadCalendar() {
  let cfg = {};
  try { cfg = JSON.parse(localStorage.getItem('hrananetu_cfg')||'{}'); } catch(e){}

  const msg = document.getElementById('kal-msg');

  if (!cfg.apiKey || !cfg.calId) {
    msg.style.display = 'block';
    msg.textContent = 'Nastav Google Calendar API na úvodní stránce.';
    render(); return;
  }

  msg.style.display = 'block';
  msg.textContent = 'Načítám turnaje…';

  try {
    const now = new Date();
    const tMin = new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString();
    const tMax = new Date(now.getFullYear()+1, 11, 31).toISOString();
    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cfg.calId)}/events?key=${cfg.apiKey}&timeMin=${tMin}&timeMax=${tMax}&singleEvents=true&orderBy=startTime&maxResults=300`;

    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error?.message || 'HTTP '+res.status);
    }
    const data = await res.json();

    allEvents = (data.items||[]).map(item => {
      const startRaw = item.start?.dateTime || item.start?.date;
      if (!startRaw) return null;
      const startDate = new Date(startRaw);
      if (isNaN(startDate)) return null;

      const rawTitle  = item.summary || '';
      const cleanTitle = stripEmoji(rawTitle); // titulek bez emoji
      const ligaId    = detectLiga(rawTitle);
      const liga      = ligaId ? LIGA_CFG[ligaId] : null;
      const isFinale  = /fin[aá]le/i.test(rawTitle);
      const fields    = parseDesc(item.description);

      const autoTime  = startDate.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
      const startTime = fields['start'] || autoTime;
      const regTime   = fields['registrace'] || subMins(startTime, 30);

      // Nastav tlačítko "Přidat do kalendáře"
      if (cfg.calId) {
        const btn = document.getElementById('add-btn');
        if (btn) btn.href = `https://calendar.google.com/calendar/r?cid=${encodeURIComponent(cfg.calId)}`;
      }

      return { rawTitle, cleanTitle, ligaId, liga, isFinale, startDate, startTime, regTime,
        format: fields['formát'] || '—',
        place:  fields['místo']  || '—',
        rounds: fields['počet kol'] || '—',
        entry:  fields['vstupné']   || '—',
        prizes: fields['ceny']      || '—',
      };
    }).filter(Boolean);

    msg.style.display = 'none';
    render();
  } catch(err) {
    msg.style.display = 'block';
    msg.textContent = '⚠ ' + err.message;
    render();
  }
}

// ── RENDER ──
function shiftMonth(d) { monthOff += d; render(); }
function setFilter(v)  { activeFilter = v; render(); }

function render() {
  const today = new Date(); today.setHours(0,0,0,0);
  const base  = new Date(today.getFullYear(), today.getMonth()+monthOff, 1);
  const yr = base.getFullYear(), mo = base.getMonth();

  document.getElementById('month-label').textContent = MONTHS[mo].toUpperCase() + ' ' + yr;

  const dow0      = (new Date(yr,mo,1).getDay()+6)%7;
  const daysInMo  = new Date(yr,mo+1,0).getDate();
  const cells     = Math.ceil((dow0+daysInMo)/7)*7;
  const vStart    = new Date(yr,mo,1-dow0);
  const vEnd      = new Date(vStart); vEnd.setDate(vStart.getDate()+cells-1); vEnd.setHours(23,59,59,999);

  // Filtruj
  let evs = allEvents.filter(e => e.startDate >= vStart && e.startDate <= vEnd);
  if (activeFilter === 'other') evs = evs.filter(e => !e.ligaId);
  else if (activeFilter !== 'all') evs = evs.filter(e => e.ligaId === activeFilter);

  // Group by day
  const byDay = {};
  evs.forEach(e => { const k=e.startDate.toDateString(); (byDay[k]=byDay[k]||[]).push(e); });

  // Flat pro modal
  flatEvs = [];
  for (let i=0; i<cells; i++) {
    const d = new Date(vStart); d.setDate(vStart.getDate()+i);
    (byDay[d.toDateString()]||[]).forEach(e => flatEvs.push(e));
  }

  // Render head
  const head = DAYS.map(d=>`<div class="kal-hdr">${d}</div>`).join('');

  // Render body
  let body = '';
  for (let i=0; i<cells; i++) {
    const d = new Date(vStart); d.setDate(vStart.getDate()+i);
    const out     = d.getMonth()!==mo;
    const isToday = d.toDateString()===today.toDateString();
    const dayEvs  = byDay[d.toDateString()]||[];
    const cls = (out?'out ':'')+(isToday?'today':'');
    const pills = dayEvs.map(e => {
      const idx = flatEvs.indexOf(e);
      const pcls = e.isFinale ? 'finale' : (e.ligaId||'other');
      return `<div class="pill pill-${pcls}" onclick="openModal(${idx})" title="${e.cleanTitle}">${e.startTime!=='—'?e.startTime+' ':''}${e.cleanTitle}</div>`;
    }).join('');
    body += `<div class="kal-cell ${cls}"><div class="day-num">${d.getDate()}</div><div class="pills">${pills}</div></div>`;
  }

  document.getElementById('kal-wrap').innerHTML =
    `<div class="kal-head">${head}</div><div class="kal-body">${body}</div>`;
}

// ── MODAL ──
function openModal(idx) {
  const e = flatEvs[idx]; if (!e) return;
  const color = e.isFinale ? '#f0a500' : (e.liga ? e.liga.color : 'var(--pl)');
  const tag   = e.isFinale ? 'Finálový turnaj' : (e.liga ? e.liga.label : 'Akce');
  const ds    = e.startDate.toLocaleDateString('cs-CZ',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  document.getElementById('modal-top').style.background   = color;
  document.getElementById('modal-tag').textContent        = tag;
  document.getElementById('modal-tag').style.color        = color;
  document.getElementById('modal-title').textContent      = e.cleanTitle;
  document.getElementById('modal-date').textContent       = ds;

  const rows = [
    e.regTime && e.regTime!=='—'  ? {l:'Registrace',v:e.regTime,   full:false} : null,
    e.startTime                    ? {l:'Start',      v:e.startTime, full:false} : null,
    e.rounds && e.rounds!=='—'    ? {l:'Počet kol',  v:e.rounds,    full:false} : null,
    e.entry  && e.entry!=='—'     ? {l:'Vstupné',    v:e.entry,     full:false} : null,
    e.format && e.format!=='—'    ? {l:'Formát',     v:e.format,    full:false} : null,
    e.place  && e.place!=='—'     ? {l:'Místo',      v:e.place,     full:true}  : null,
  ].filter(Boolean);

  const prizes = e.prizes && e.prizes!=='—'
    ? `<div class="prizes-box"><div class="prizes-title">Ceny</div>${
        e.prizes.split(',').map(p=>`<div class="prize-row">${p.trim()}</div>`).join('')
      }</div>` : '';

  document.getElementById('modal-body').innerHTML =
    `<div class="detail-grid">${rows.map(r=>`<div class="detail-row${r.full?' full':''}"><div class="detail-lbl">${r.l}</div><div class="detail-val">${r.v}</div></div>`).join('')}</div>${prizes}`;

  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ── START ──
render();
loadCalendar();
</script>
